<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIMBOT PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a12; color: #fff; padding: 16px; min-height: 100vh; }
        .header { text-align: center; padding: 12px 0 20px; border-bottom: 1px solid #1a1a2e; }
        .header h1 { font-size: 24px; background: linear-gradient(135deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #111122; padding: 12px 16px; border-radius: 12px; margin: 12px 0; border: 1px solid #1a1a2e; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-dot.on { background: #00ff88; box-shadow: 0 0 12px #00ff8866; }
        .status-dot.off { background: #ff4444; box-shadow: 0 0 12px #ff444466; }
        .status-text { font-size: 14px; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 8px 0; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 8px 0; }
        .btn { padding: 14px 4px; border: none; border-radius: 10px; font-size: 12px; font-weight: 600; color: #fff; background: #1a1a2e; cursor: pointer; transition: all 0.15s; text-align: center; }
        .btn:active { transform: scale(0.92); opacity: 0.7; }
        .btn-primary { background: linear-gradient(135deg, #f7971e, #ffd200); color: #000; }
        .btn-success { background: linear-gradient(135deg, #00b894, #00cec9); }
        .btn-danger { background: linear-gradient(135deg, #e17055, #d63031); }
        .btn-purple { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
        .btn-pink { background: linear-gradient(135deg, #fd79a8, #e84393); }
        .btn-blue { background: linear-gradient(135deg, #0984e3, #74b9ff); }
        .btn-dark { background: #2d2d44; }
        .btn-active { border: 2px solid #00ff88; box-shadow: 0 0 20px #00ff8844; }
        .section-title { font-size: 12px; font-weight: 600; color: #888; margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 1px; }
        .log-box { background: #0a0a15; border: 1px solid #1a1a2e; border-radius: 10px; padding: 8px 10px; height: 80px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #88ff88; margin-top: 8px; line-height: 1.4; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid #0f0f1a; }
        .log-entry .time { color: #555; margin-right: 4px; }
        .log-entry .info { color: #88ff88; }
        .log-entry .error { color: #ff4444; }
        .log-entry .cmd { color: #66ccff; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .badge-on { background: #00ff8833; color: #00ff88; }
        .badge-off { background: #ff444433; color: #ff4444; }
        .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; border: 1px solid #333; box-shadow: 0 8px 32px rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; max-width: 90%; text-align: center; }
        .toast.show { opacity: 1; }
        .toast.success { border-color: #00ff88; }
        .toast.error { border-color: #ff4444; }
        .footer { text-align: center; padding: 12px 0 4px; font-size: 10px; color: #333; border-top: 1px solid #1a1a2e; margin-top: 8px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎯 AIMBOT PRO</h1>
    <div style="font-size:11px;color:#555;margin-top:2px;">v3.0 | Vercel + Ngrok</div>
</div>

<div class="status-bar">
    <div>
        <span class="status-dot off" id="statusDot"></span>
        <span class="status-text" id="statusText">ĐÃ TẮT</span>
    </div>
    <div style="text-align:right;">
        <span class="badge badge-off" id="modeBadge">HEAD</span>
        <div style="font-size:9px;color:#444;word-break:break-all;margin-top:2px;" id="urlDisplay">🔗 Đang kết nối...</div>
    </div>
</div>

<div class="section-title">🎯 CHẾ ĐỘ AIM</div>
<div class="grid">
    <button class="btn btn-primary btn-active" data-mode="head" onclick="setMode('head')">ĐẦU</button>
    <button class="btn btn-blue" data-mode="neck" onclick="setMode('neck')">CỔ</button>
    <button class="btn btn-success" data-mode="chest" onclick="setMode('chest')">NGỰC</button>
    <button class="btn btn-purple" data-mode="hips" onclick="setMode('hips')">HÔNG</button>
</div>

<div class="section-title">⚡ ĐIỀU KHIỂN</div>
<div class="grid-2">
    <button class="btn btn-success" onclick="onAim()">▶️ BẬT</button>
    <button class="btn btn-danger" onclick="offAim()">⏹ TẮT</button>
    <button class="btn btn-pink" onclick="lockAim()">🔒 KHÓA</button>
    <button class="btn btn-blue" onclick="unlockAim()">🔓 MỞ</button>
</div>

<div class="section-title">🚀 PRO</div>
<div class="grid-2">
    <button class="btn btn-dark" id="btnAutoFire" onclick="toggleAutoFire()">🔥 AUTO OFF</button>
    <button class="btn btn-dark" id="btnTrigger" onclick="toggleTrigger()">🎯 TRIG OFF</button>
</div>

<div class="section-title">💀 CHẾ ĐỘ</div>
<div class="grid-2">
    <button class="btn btn-danger" onclick="rageMode()">⚡ RAGE</button>
    <button class="btn btn-success" onclick="legitMode()">🎯 LEGIT</button>
</div>

<div class="section-title">📊 STATS</div>
<div class="grid-2">
    <button class="btn btn-purple" onclick="showStats()">📊 STATS</button>
    <button class="btn btn-dark" onclick="resetStats()">🔄 RESET</button>
</div>

<div class="section-title">📋 LOG</div>
<div class="log-box" id="logBox">
    <div class="log-entry"><span class="time">[INIT]</span><span class="info">🚀 AIMBOT PRO khởi động</span></div>
</div>

<div class="toast" id="toast"></div>
<div class="footer">🔒 KHÔNG JAILBREAK | 📱 iOS 16+</div>

<script>
// ================================================================
// CẤU HÌNH - THAY URL NGROK CỦA BẠN
// ================================================================
const PUBLIC_URL = "https://wobbly-nucleus-bonanza.ngrok-free.dev";
const VERSION = "3.0.0";

// ================================================================
// TRẠNG THÁI
// ================================================================
const state = {
    isActive: false,
    mode: "head",
    locked: false,
    autoFire: false,
    triggerBot: false,
    shotsFired: 0,
    hitsLanded: 0,
    headshots: 0,
    kills: 0,
    startTime: 0,
    connectionStatus: "DISCONNECTED"
};

// ================================================================
// LOG
// ================================================================
function addLog(type, msg) {
    const box = document.getElementById('logBox');
    const time = new Date().toLocaleTimeString();
    const map = { 'CMD': 'cmd', 'INFO': 'info', 'ERROR': 'error' };
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<span class="time">[${time}]</span><span class="${map[type] || 'info'}">${msg}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    if (box.children.length > 30) box.removeChild(box.children[0]);
}

// ================================================================
// TOAST
// ================================================================
let toastTimer = null;
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 2000);
}

// ================================================================
// GỬI LỆNH
// ================================================================
async function sendCommand(cmd, data = {}) {
    try {
        const url = PUBLIC_URL + '/api/command';
        const payload = {
            command: cmd,
            data: data,
            timestamp: Date.now() / 1000,
            version: VERSION,
            device_uid: 'WEB_' + Date.now().toString(36),
            session_id: Date.now().toString(36)
        };
        
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true'
            },
            body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
            addLog('ERROR', 'HTTP ' + response.status);
            showToast('❌ Lỗi HTTP: ' + response.status, 'error');
            return null;
        }
        
        const result = await response.json();
        state.connectionStatus = "CONNECTED";
        addLog('INFO', '✅ Kết nối thành công');
        updateStatus();
        return result;
        
    } catch (e) {
        state.connectionStatus = "ERROR";
        addLog('ERROR', 'Lỗi: ' + e.message);
        showToast('❌ ' + e.message, 'error');
        updateStatus();
        return null;
    }
}

// ================================================================
// UPDATE STATUS
// ================================================================
function updateStatus() {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    const modeBadge = document.getElementById('modeBadge');
    const urlDisplay = document.getElementById('urlDisplay');
    if (state.isActive) {
        dot.className = 'status-dot on';
        text.textContent = '🟢 ĐANG CHẠY';
        text.style.color = '#00ff88';
    } else {
        dot.className = 'status-dot off';
        text.textContent = '🔴 ĐÃ TẮT';
        text.style.color = '#ff4444';
    }
    modeBadge.textContent = state.mode.toUpperCase();
    modeBadge.className = 'badge ' + (state.isActive ? 'badge-on' : 'badge-off');
    urlDisplay.textContent = '🔗 ' + PUBLIC_URL.replace('https://', '');
}

// ================================================================
// LỆNH
// ================================================================
async function setMode(mode) {
    state.mode = mode;
    await sendCommand('setMode', { mode: mode });
    updateStatus();
    showToast('🎯 ' + mode.toUpperCase());
    addLog('INFO', 'Mode: ' + mode.toUpperCase());
    document.querySelectorAll('[data-mode]').forEach(b => {
        b.classList.toggle('btn-active', b.dataset.mode === mode);
    });
}

async function onAim() {
    addLog('INFO', '⏳ Đang gửi lệnh BẬT...');
    const r = await sendCommand('onAim');
    if (r && r.status === 'ok') {
        state.isActive = true;
        state.startTime = Date.now();
        updateStatus();
        showToast('✅ AIMBOT ĐÃ BẬT', 'success');
        addLog('INFO', '🟢 Aimbot ON');
    } else {
        addLog('ERROR', 'Bật aimbot thất bại');
    }
}

async function offAim() {
    const r = await sendCommand('offAim');
    if (r && r.status === 'ok') {
        state.isActive = false;
        updateStatus();
        showToast('⏹ ĐÃ TẮT', 'success');
        addLog('INFO', '🔴 Aimbot OFF');
    }
}

async function lockAim() {
    state.locked = true;
    await sendCommand('lock');
    updateStatus();
    showToast('🔒 ĐÃ KHÓA', 'success');
    addLog('CMD', 'LOCK');
}

async function unlockAim() {
    state.locked = false;
    await sendCommand('unlock');
    updateStatus();
    showToast('🔓 ĐÃ MỞ', 'success');
    addLog('CMD', 'UNLOCK');
}

async function toggleAutoFire() {
    state.autoFire = !state.autoFire;
    await sendCommand('autoFire', { enabled: state.autoFire });
    const b = document.getElementById('btnAutoFire');
    b.textContent = state.autoFire ? '🔥 AUTO ON' : '🔥 AUTO OFF';
    b.style.border = state.autoFire ? '2px solid #00ff88' : 'none';
    showToast('Auto Fire: ' + (state.autoFire ? 'ON' : 'OFF'));
    addLog('CMD', 'AutoFire: ' + (state.autoFire ? 'ON' : 'OFF'));
}

async function toggleTrigger() {
    state.triggerBot = !state.triggerBot;
    await sendCommand('triggerBot', { enabled: state.triggerBot });
    const b = document.getElementById('btnTrigger');
    b.textContent = state.triggerBot ? '🎯 TRIG ON' : '🎯 TRIG OFF';
    b.style.border = state.triggerBot ? '2px solid #00ff88' : 'none';
    showToast('Trigger: ' + (state.triggerBot ? 'ON' : 'OFF'));
    addLog('CMD', 'Trigger: ' + (state.triggerBot ? 'ON' : 'OFF'));
}

async function rageMode() {
    state.autoFire = true;
    state.triggerBot = true;
    await sendCommand('rageMode', { enabled: true });
    document.getElementById('btnAutoFire').textContent = '🔥 AUTO ON';
    document.getElementById('btnAutoFire').style.border = '2px solid #00ff88';
    document.getElementById('btnTrigger').textContent = '🎯 TRIG ON';
    document.getElementById('btnTrigger').style.border = '2px solid #00ff88';
    showToast('⚡ RAGE MODE', 'success');
    addLog('INFO', '⚡ RAGE MODE');
}

async function legitMode() {
    state.autoFire = false;
    state.triggerBot = false;
    await sendCommand('legitMode', { enabled: true });
    document.getElementById('btnAutoFire').textContent = '🔥 AUTO OFF';
    document.getElementById('btnAutoFire').style.border = 'none';
    document.getElementById('btnTrigger').textContent = '🎯 TRIG OFF';
    document.getElementById('btnTrigger').style.border = 'none';
    showToast('🎯 LEGIT MODE', 'success');
    addLog('INFO', '🎯 LEGIT MODE');
}

async function showStats() {
    const r = await sendCommand('stats');
    if (r && r.status === 'ok') {
        const el = state.startTime ? Math.floor((Date.now() - state.startTime) / 1000) : 0;
        const acc = r.shots > 0 ? (r.hits / r.shots * 100).toFixed(1) : 0;
        showToast('📊 ' + el + 's | Bắn: ' + (r.shots || 0) + ' | Trúng: ' + (r.hits || 0) + ' | Acc: ' + acc + '%');
        addLog('INFO', 'Stats: Shots=' + (r.shots || 0) + ' Hits=' + (r.hits || 0));
    }
}

async function resetStats() {
    state.shotsFired = 0;
    state.hitsLanded = 0;
    state.headshots = 0;
    state.kills = 0;
    state.startTime = Date.now();
    await sendCommand('reset');
    showToast('🔄 ĐÃ RESET', 'success');
    addLog('INFO', 'Stats reset');
}

// ================================================================
// KIỂM TRA KẾT NỐI
// ================================================================
async function testConnection() {
    addLog('INFO', '⏳ Đang kiểm tra kết nối...');
    try {
        const url = PUBLIC_URL + '/ping';
        const response = await fetch(url, {
            headers: { 'ngrok-skip-browser-warning': 'true' }
        });
        if (response.ok) {
            state.connectionStatus = "CONNECTED";
            addLog('INFO', '✅ Kết nối thành công!');
            showToast('✅ Kết nối thành công', 'success');
        } else {
            state.connectionStatus = "ERROR_" + response.status;
            addLog('ERROR', '❌ Kết nối thất bại: HTTP ' + response.status);
            showToast('❌ Lỗi ' + response.status, 'error');
        }
    } catch (e) {
        state.connectionStatus = "ERROR";
        addLog('ERROR', '❌ Không kết nối được: ' + e.message);
        showToast('❌ ' + e.message, 'error');
    }
    updateStatus();
}

// ================================================================
// KHỞI TẠO
// ================================================================
function init() {
    addLog('INFO', '🌐 URL: ' + PUBLIC_URL);
    addLog('INFO', '✅ Sẵn sàng');
    updateStatus();
    document.querySelectorAll('[data-mode]').forEach(b => {
        b.classList.toggle('btn-active', b.dataset.mode === state.mode);
    });
    setTimeout(testConnection, 1000);
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
