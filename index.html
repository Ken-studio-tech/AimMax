<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 AIMBOT PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a12; color: #fff; padding: 16px; min-height: 100vh; }
        .header { text-align: center; padding: 12px 0; border-bottom: 1px solid #1a1a2e; }
        .header h1 { font-size: 24px; background: linear-gradient(135deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #111122; padding: 12px 16px; border-radius: 12px; margin: 12px 0; border: 1px solid #1a1a2e; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-dot.on { background: #00ff88; box-shadow: 0 0 12px #00ff8866; }
        .status-dot.off { background: #ff4444; box-shadow: 0 0 12px #ff444466; }
        .status-text { font-size: 14px; font-weight: 600; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 12px 0; }
        .btn { padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; color: #fff; background: #1a1a2e; cursor: pointer; text-align: center; touch-action: manipulation; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-success { background: linear-gradient(135deg, #00b894, #00cec9); }
        .btn-danger { background: linear-gradient(135deg, #e17055, #d63031); }
        .btn-primary { background: linear-gradient(135deg, #f7971e, #ffd200); color: #000; }
        .btn-purple { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
        .btn-blue { background: linear-gradient(135deg, #0984e3, #74b9ff); }
        .btn-pink { background: linear-gradient(135deg, #fd79a8, #e84393); }
        .log-box { background: #0a0a15; border: 1px solid #1a1a2e; border-radius: 10px; padding: 10px; height: 120px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #88ff88; margin-top: 12px; line-height: 1.6; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid #0f0f1a; }
        .log-entry .time { color: #555; margin-right: 6px; }
        .log-entry .info { color: #88ff88; }
        .log-entry .error { color: #ff4444; }
        .log-entry .cmd { color: #66ccff; }
        .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 14px; border: 1px solid #333; box-shadow: 0 8px 32px rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; max-width: 90%; text-align: center; }
        .toast.show { opacity: 1; }
        .toast.success { border-color: #00ff88; }
        .toast.error { border-color: #ff4444; }
        .footer { text-align: center; padding: 12px 0 4px; font-size: 10px; color: #333; border-top: 1px solid #1a1a2e; margin-top: 12px; }
        #connStatus { text-align:center; padding:6px; font-size:12px; border-radius:8px; margin:8px 0; background:#111; }
        .connected { color: #00ff88; }
        .disconnected { color: #ff4444; }
        .checking { color: #ffcc00; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎯 AIMBOT PRO</h1>
    <div style="font-size:11px;color:#555;">✅ Server đang hoạt động</div>
</div>

<div class="status-bar">
    <div>
        <span class="status-dot off" id="statusDot"></span>
        <span class="status-text" id="statusText">ĐÃ TẮT</span>
    </div>
    <div style="text-align:right;">
        <span style="font-size:11px;color:#888;" id="modeDisplay">HEAD</span>
    </div>
</div>

<div id="connStatus" class="checking">⏳ Đang kiểm tra kết nối...</div>

<div class="grid-2">
    <button class="btn btn-success" onclick="sendCmd('onAim')">▶️ BẬT</button>
    <button class="btn btn-danger" onclick="sendCmd('offAim')">⏹ TẮT</button>
    <button class="btn btn-primary" onclick="sendCmd('setMode','head')">🎯 ĐẦU</button>
    <button class="btn btn-blue" onclick="sendCmd('setMode','chest')">🎯 NGỰC</button>
    <button class="btn btn-pink" onclick="sendCmd('lock')">🔒 KHÓA</button>
    <button class="btn btn-purple" onclick="sendCmd('unlock')">🔓 MỞ</button>
</div>

<div class="log-box" id="logBox">
    <div class="log-entry"><span class="time">[INIT]</span><span class="info">🚀 AIMBOT PRO khởi động</span></div>
</div>

<div class="toast" id="toast"></div>
<div class="footer">🔒 KHÔNG JAILBREAK | 📱 iOS 16+</div>

<script>
// ================================================================
// CẤU HÌNH
// ================================================================
const PUBLIC_URL = "https://wobbly-nucleus-bonanza.ngrok-free.dev";

// ================================================================
// TRẠNG THÁI
// ================================================================
let isActive = false;
let currentMode = "head";

// ================================================================
// LOG
// ================================================================
function addLog(msg, type = 'info') {
    const box = document.getElementById('logBox');
    const time = new Date().toLocaleTimeString();
    const map = { 'info': 'info', 'error': 'error', 'cmd': 'cmd' };
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<span class="time">[${time}]</span><span class="${map[type] || 'info'}">${msg}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    if (box.children.length > 30) box.removeChild(box.children[0]);
}

// ================================================================
// TOAST
// ================================================================
let toastTimer = null;
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 2000);
}

// ================================================================
// GỬI LỆNH
// ================================================================
async function sendCmd(command, data = null) {
    try {
        const payload = { command: command };
        if (data !== null) payload.data = data;
        
        const response = await fetch(PUBLIC_URL + '/api/command', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true'
            },
            body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
            addLog('❌ HTTP ' + response.status, 'error');
            showToast('❌ Lỗi ' + response.status, 'error');
            return;
        }
        
        const result = await response.json();
        addLog('✅ ' + command + ' → ' + result.status, 'cmd');
        showToast('✅ ' + command + ' thành công', 'success');
        
        if (command === 'onAim') {
            isActive = true;
            document.getElementById('statusDot').className = 'status-dot on';
            document.getElementById('statusText').textContent = '🟢 ĐANG CHẠY';
            document.getElementById('statusText').style.color = '#00ff88';
        } else if (command === 'offAim') {
            isActive = false;
            document.getElementById('statusDot').className = 'status-dot off';
            document.getElementById('statusText').textContent = '🔴 ĐÃ TẮT';
            document.getElementById('statusText').style.color = '#ff4444';
        } else if (command === 'setMode') {
            currentMode = data;
            document.getElementById('modeDisplay').textContent = data.toUpperCase();
            addLog('🎯 Mode: ' + data.toUpperCase(), 'info');
        }
        
        document.getElementById('connStatus').innerHTML = '✅ Kết nối thành công!';
        document.getElementById('connStatus').className = 'connected';
        
    } catch (e) {
        addLog('❌ Lỗi: ' + e.message, 'error');
        showToast('❌ ' + e.message, 'error');
        document.getElementById('connStatus').innerHTML = '❌ Mất kết nối!';
        document.getElementById('connStatus').className = 'disconnected';
    }
}

// ================================================================
// KIỂM TRA KẾT NỐI
// ================================================================
async function testConnection() {
    try {
        const response = await fetch(PUBLIC_URL + '/ping', {
            headers: { 'ngrok-skip-browser-warning': 'true' }
        });
        if (response.ok) {
            document.getElementById('connStatus').innerHTML = '✅ Kết nối thành công!';
            document.getElementById('connStatus').className = 'connected';
            addLog('✅ Kết nối thành công', 'info');
            showToast('✅ Kết nối thành công', 'success');
        } else {
            document.getElementById('connStatus').innerHTML = '❌ Lỗi HTTP ' + response.status;
            document.getElementById('connStatus').className = 'disconnected';
            addLog('❌ Lỗi HTTP ' + response.status, 'error');
        }
    } catch (e) {
        document.getElementById('connStatus').innerHTML = '❌ Không kết nối được!';
        document.getElementById('connStatus').className = 'disconnected';
        addLog('❌ Không kết nối: ' + e.message, 'error');
        showToast('❌ Không kết nối được server', 'error');
    }
}

// ================================================================
// KHỞI TẠO
// ================================================================
function init() {
    addLog('🌐 URL: ' + PUBLIC_URL, 'info');
    addLog('✅ Sẵn sàng', 'info');
    setTimeout(testConnection, 500);
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
