<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIMBOT</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0a0a12; color: #fff; padding: 16px; }
        .btn { padding: 14px; margin: 6px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; background: #2d2d44; color: #fff; cursor: pointer; width: 45%; }
        .btn:active { transform: scale(0.95); }
        .btn-on { background: #00b894; }
        .btn-off { background: #d63031; }
        .btn-mode { background: #6c5ce7; width: 30%; }
        .log { background: #0a0a15; border: 1px solid #1a1a2e; border-radius: 10px; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #88ff88; margin-top: 12px; }
        .log .ok { color: #00ff88; }
        .log .fail { color: #ff4444; }
        .log .cmd { color: #66ccff; }
        .status { padding: 10px; margin: 10px 0; border-radius: 8px; background: #111; text-align: center; font-size: 14px; }
        .status.on { border-color: #00ff88; color: #00ff88; }
        .status.off { border-color: #ff4444; color: #ff4444; }
        .row { display: flex; flex-wrap: wrap; justify-content: center; }
    </style>
</head>
<body>

<h1 style="text-align:center;color:#f7971e;">🎯 AIMBOT</h1>

<div class="status off" id="statusDisplay">🔴 ĐÃ TẮT</div>

<div class="row">
    <button class="btn btn-on" onclick="send('onAim')">▶️ BẬT</button>
    <button class="btn btn-off" onclick="send('offAim')">⏹ TẮT</button>
</div>

<div class="row">
    <button class="btn btn-mode" onclick="send('setMode','head')">ĐẦU</button>
    <button class="btn btn-mode" onclick="send('setMode','chest')">NGỰC</button>
    <button class="btn btn-mode" onclick="send('setMode','hips')">HÔNG</button>
</div>

<div class="row">
    <button class="btn" style="background:#fd79a8;" onclick="send('lock')">🔒 KHÓA</button>
    <button class="btn" style="background:#0984e3;" onclick="send('unlock')">🔓 MỞ</button>
</div>

<div class="log" id="logBox">
    <div><span class="ok">🚀 Aimbot đã sẵn sàng</span></div>
</div>

<script>
// ================================================================
// CẤU HÌNH - THAY URL NGROK CỦA BẠN
// ================================================================
const PUBLIC_URL = "https://wobbly-nucleus-bonanza.ngrok-free.dev";

// ================================================================
// LOG
// ================================================================
function addLog(msg, type = 'ok') {
    const box = document.getElementById('logBox');
    const time = new Date().toLocaleTimeString();
    const map = { 'ok': 'ok', 'fail': 'fail', 'cmd': 'cmd' };
    const div = document.createElement('div');
    div.innerHTML = `<span style="color:#555;">[${time}]</span> <span class="${map[type] || 'ok'}">${msg}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    if (box.children.length > 30) box.removeChild(box.children[0]);
}

// ================================================================
// GỬI LỆNH - KHÔNG CẦN KIỂM TRA KẾT NỐI
// ================================================================
async function send(cmd, data = null) {
    try {
        const payload = { command: cmd };
        if (data !== null) payload.data = data;
        
        addLog('📤 ' + cmd + (data ? ' ' + data : ''), 'cmd');
        
        const response = await fetch(PUBLIC_URL + '/api/command', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'ngrok-skip-browser-warning': 'true'
            },
            body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
            addLog('❌ HTTP ' + response.status, 'fail');
            return;
        }
        
        const result = await response.json();
        addLog('✅ ' + cmd + ' → ' + result.status, 'ok');
        
        // Cập nhật trạng thái hiển thị
        if (cmd === 'onAim') {
            document.getElementById('statusDisplay').textContent = '🟢 ĐANG CHẠY';
            document.getElementById('statusDisplay').className = 'status on';
        } else if (cmd === 'offAim') {
            document.getElementById('statusDisplay').textContent = '🔴 ĐÃ TẮT';
            document.getElementById('statusDisplay').className = 'status off';
        }
        
    } catch (e) {
        addLog('❌ Lỗi: ' + e.message, 'fail');
    }
}

// ================================================================
// KHỞI TẠO
// ================================================================
addLog('🌐 URL: ' + PUBLIC_URL, 'ok');
addLog('✅ Đã sẵn sàng', 'ok');
</script>

</body>
</html>
